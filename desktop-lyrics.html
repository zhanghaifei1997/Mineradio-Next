<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mineradio Desktop Lyrics</title>
    <style>
      :root {
        --lyric-primary: #f6fdff;
        --lyric-secondary: #a8f6ff;
        --lyric-highlight: #fff0b8;
        --lyric-glow: #9cffdf;
        --lyric-font: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        --lyric-weight: 900;
        --lyric-letter-spacing: 0px;
        --lyric-line-height: 1;
        --lyric-size: 58px;
        --lyric-progress: 0%;
        --lyric-feather: 5.5%;
        --lyric-fit-x: 1;
        --lyric-scroll-x: 0px;
        --lyric-edge-width: 92px;
        --lyric-mask-edge-width: 92px;
        --lyric-vertical-feather: 46px;
        --lyric-css-beat-glow: 0px;
        --lyric-shadow-soft: rgba(156, 255, 223, 0.34);
        --lyric-shadow-glow: rgba(156, 255, 223, 0.26);
        --lyric-shadow-hot: rgba(255, 240, 184, 0.22);
        --lyric-edge: rgba(4, 6, 12, 0.42);
        --lyric-drop: rgba(156, 255, 223, 0.38);
        --lyric-drop-paused: rgba(156, 255, 223, 0.22);
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }
      body {
        opacity: 0;
        transition: opacity 0.22s ease;
        -webkit-app-region: no-drag;
      }
      body.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/desktop-lyrics.ts"></script>
  </body>
</html>
